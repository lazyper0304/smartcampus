name: Build SmartCampus

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  auto-tag:
    name: 🏷️ Auto-create tag from VERSION
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.create_tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version and create tag
        id: create_tag
        run: |
          VERSION="v$(cat VERSION)"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -fa "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION" --force
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Created and pushed tag: $VERSION"

  android:
    name: 📱 Build Android APK
    if: github.event_name != 'workflow_dispatch' || always()
    needs: [auto-tag]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Verify Flutter
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Restore Android signing key
        run: |
          if [ -f "android/keystore.b64" ]; then
            base64 -d "android/keystore.b64" > "android/release-keystore.jks"
            echo "storePassword=smartcampus" > "android/key.properties"
            echo "keyPassword=smartcampus" >> "android/key.properties"
            echo "keyAlias=release" >> "android/key.properties"
            echo "storeFile=../release-keystore.jks" >> "android/key.properties"
            echo "Signing key restored"
          fi

      - name: Patch flutter_inappwebview_android proguard reference
        run: |
          FILE="$PUB_CACHE/hosted/pub.dev/flutter_inappwebview_android-1.1.3/android/build.gradle"
          if [ -f "$FILE" ]; then
            python3 scripts/patch_proguard.py "$FILE"
          else
            echo "Warning: $FILE not found"
          fi

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk
          compression-level: 0
          if-no-files-found: error

  windows:
    name: 🪟 Build Windows
    if: github.event_name != 'workflow_dispatch' || always()
    needs: [auto-tag]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Verify Flutter
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/runner/Release/
          compression-level: 6
          if-no-files-found: error

  release:
    name: 🚀 Publish Release
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && always())
    needs: [android, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: release/android

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release/windows

      - name: Rename artifacts
        shell: bash
        run: |
          VERSION="${{ needs.android.outputs.version }}"
          for f in release/android/*.apk; do
            abi=$(echo "$f" | sed -n 's/.*-\(arm64-v8a\|armeabi-v7a\|x86_64\).*/\1/p')
            if [ -n "$abi" ]; then
              mv "$f" "release/android/宜院宾果-v${VERSION}-${abi}.apk"
            fi
          done
          cd release/windows
          7z a -tzip "../宜院宾果-v${VERSION}-windows.zip" ./*
          cd ../..
          ls -la release/

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.android.outputs.version }}"
          TAG="v${VERSION}"
          cat > release-notes.md <<- NOTEEND
          ## 宜院宾果 v${VERSION}

          修复了一些问题。
          NOTEEND
          gh release view "$TAG" --json id 2>/dev/null && gh release delete "$TAG" -y || true
          gh release create "$TAG" \
            --title "宜院宾果 v${VERSION}" \
            --notes-file release-notes.md \
            release/android/*.apk \
            release/*.zip

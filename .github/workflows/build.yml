name: Build SmartCampus

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  android:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Verify Flutter
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_android proguard reference
        run: |
          BUILD_FILE="$PUB_CACHE/hosted/pub.dev/flutter_inappwebview_android-1.1.3/android/build.gradle"
          if [ -f "$BUILD_FILE" ]; then
            sed -i "s/getDefaultProguardFile('proguard-android.txt')/getDefaultProguardFile('proguard-android-optimize.txt')/g" "$BUILD_FILE"
            sed -i 's/getDefaultProguardFile("proguard-android.txt")/getDefaultProguardFile("proguard-android-optimize.txt")/g" "$BUILD_FILE"
            echo "Patched proguard reference in $BUILD_FILE"
          else
            echo "Warning: $BUILD_FILE not found"
          fi

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk
          compression-level: 0
          if-no-files-found: error

  windows:
    name: 🪟 Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Verify Flutter
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/runner/Release/
          compression-level: 6
          if-no-files-found: error

  release:
    name: 🚀 Publish Release
    needs: [android, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: release/android

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release/windows

      - name: Rename artifacts
        shell: bash
        run: |
          VERSION="${{ needs.android.outputs.version }}"
          # Rename APKs with readable names
          for f in release/android/*.apk; do
            abi=$(echo "$f" | sed -n 's/.*-\(arm64-v8a\|armeabi-v7a\|x86_64\).*/\1/p')
            if [ -n "$abi" ]; then
              mv "$f" "release/android/宜院宾果-v${VERSION}-${abi}.apk"
            fi
          done
          # Zip windows build
          cd release/windows
          7z a -tzip "../宜院宾果-v${VERSION}-windows.zip" ./*
          cd ../..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/android/*.apk
            release/*.zip
          name: 宜院宾果 v${{ needs.android.outputs.version }}
          body: |
            ## 宜院宾果 v${{ needs.android.outputs.version }}

            ### 📦 下载说明
            - **Android APK**：按 CPU 架构分为三个文件，通用选择 arm64-v8a
            - **Windows**：ZIP 压缩包，解压后运行 宜院宾果.exe
          draft: false
          prerelease: false
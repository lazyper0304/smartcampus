name: Build SmartCampus

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  android:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Verify Flutter
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Fix proguard for flutter_inappwebview
        run: |
          PROGUARD_DIR="$ANDROID_HOME/tools/proguard"
          if [ -f "$PROGUARD_DIR/proguard-android-optimize.txt" ] && [ ! -f "$PROGUARD_DIR/proguard-android.txt" ]; then
            ln -sf "$PROGUARD_DIR/proguard-android-optimize.txt" "$PROGUARD_DIR/proguard-android.txt"
            echo "Created proguard-android.txt symlink"
          fi

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk
          compression-level: 0
          if-no-files-found: error

  windows:
    name: 🪟 Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Verify Flutter
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/runner/Release/
          compression-level: 6
          if-no-files-found: error
